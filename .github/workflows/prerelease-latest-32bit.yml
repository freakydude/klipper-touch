name: 'prerelease-latest-32bit'
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ !(github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')) }}
env:
  tagName: prerelease-latest
  releaseName: prerelease-latest
  preRelease: true
  CARGO_TERM_COLOR: always
  nodeVersion: 22.22.2
jobs:
  release-armv7:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Build app
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: https://dietpi.com/downloads/images/DietPi_RPi2-ARMv7-Bookworm.img.xz
          cpu: cortex-a53
          bind_mount_repository: true
          image_additional_mb: 10240
          optimize_image: no
          commands: |
            # Prevent Rust from complaining about $HOME not matching eid home
            export HOME=/root

            # Workaround to CI worker being stuck on Updating crates.io index
            export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse

            # Install setup prerequisites
            apt-get update -y --allow-releaseinfo-change
            apt-get autoremove -y
            apt-get install -y --no-install-recommends --no-install-suggests curl xz-utils libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            . "$HOME/.cargo/env"

            # Install Node from official tarball because NodeSource does not provide armv7 for current lines.
            NODE_VERSION="${{ env.nodeVersion }}"
            NODE_DIST_ARCH="armv7l"
            NODE_DIST_URL="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-${NODE_DIST_ARCH}.tar.xz"

            if ! curl -fsI "$NODE_DIST_URL" >/dev/null; then
              echo "Node ${NODE_VERSION} is not available for linux-${NODE_DIST_ARCH}."
              exit 1
            fi

            curl -fsSL "$NODE_DIST_URL" -o /tmp/node.tar.xz
            tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
            node -v
            npm -v

            # armv7 uses Node 22 as a legacy fallback while project baseline is Node 24.
            npm config set engine-strict false
            npm ci

            # Build the application
            npm run tauri build -- --verbose

      - name: Get app version
        run: echo "APP_VERSION=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: Get product name
        run: echo "APP_NAME=$(jq -r .productName src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: Resolve bundle file paths
        run: |
          DEB_BUNDLE=$(find "$GITHUB_WORKSPACE/src-tauri/target/release/bundle/deb" -maxdepth 1 -type f -name '*.deb' | head -n 1)
          RPM_BUNDLE=$(find "$GITHUB_WORKSPACE/src-tauri/target/release/bundle/rpm" -maxdepth 1 -type f -name '*.rpm' | head -n 1)

          if [ -z "$DEB_BUNDLE" ]; then
            echo "No .deb bundle found"
            exit 1
          fi

          if [ -z "$RPM_BUNDLE" ]; then
            echo "No .rpm bundle found"
            exit 1
          fi

          echo "DEB_BUNDLE=$DEB_BUNDLE" >> $GITHUB_ENV
          echo "RPM_BUNDLE=$RPM_BUNDLE" >> $GITHUB_ENV

      - name: Upload deb bundle
        uses: actions/upload-artifact@v7
        with:
          name: Debian ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_armv7l.deb
          path: ${{ env.DEB_BUNDLE }}

      - name: Upload rpm bundle
        uses: actions/upload-artifact@v7
        with:
          name: RPM ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-armv7l.rpm
          path: ${{ env.RPM_BUNDLE }}

      - name: upload release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.releaseName }}
          tag_name: ${{ env.tagName }}
          prerelease: ${{ env.preRelease }}
          generate_release_notes: true
          files: |
            ${{ env.DEB_BUNDLE }}
            ${{ env.RPM_BUNDLE }}
